baseURL: "https://notfirefox.dev"
title: "notfirefox.dev"
theme: "PaperMod"

params:
  env: prodcution
  defaultTheme: auto
  disableThemeToggle: true
  ShowReadingTime: true
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowWordCount: true
  ShowFullTextInRSS: true
  ShowCodeCopyButtons: true
  ShowToc: false

  profileMode:
    enabled: false

  socialIcons:
    - name: github
      url: "https://github.com/notfirefox"
    - name: rss
      url: /index.xml

  homeInfoParams:
    title: "About us"
    content: >
      There are so many ways to approach technology. Here at notfirefox.dev
      we discuss unusual ways to utilize technology in the 21st century and
      present alternatives to common approaches.

  cover:
    hidden: false
    hiddenInList: true
    hiddenInSingle: false

  fuseOpts:
      isCaseSensitive: false
      shouldSort: true
      location: 0
      distance: 1000
      threshold: 0.4
      minMatchCharLength: 0
      keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    style: dracula
    lineNos: false
    noClasses: false
    guessSyntax: true

menu:
  main:
    - identifier: Archive
      name: Archive
      url: /archive/
      weight: 10
    - identifier: Tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: Search
      name: Search
      url: /search/
      weight: 30

privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
  instagram:
    disable: true
  twitter:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: true

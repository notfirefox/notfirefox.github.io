baseURL: "https://notfirefox.dev"
title: "notfirefox"
theme: "wondermod"

params:
  env: prodcution
  defaultTheme: dark
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowWordCount: true
  ShowFullTextInRSS: true
  ShowCodeCopyButtons: true

  profileMode:
    enabled: true
    title: notfirefox
    subtitle: "Developer and Security Researcher"
    imageUrl: "/user.jpg"

  socialIcons:
    - name: github
      url: "https://github.com/notfirefox"
    - name: matrix
      url: "https://matrix.to/#/@notfirefox:matrix.org"
    - name: rss
      url: /index.xml

  cover:
    hidden: false
    hiddenInList: true
    hiddenInSingle: false

  fuseOpts:
      isCaseSensitive: false
      shouldSort: true
      location: 0
      distance: 1000
      threshold: 0.4
      minMatchCharLength: 0
      keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    style: dracula
    lineNos: false
    noClasses: false
    guessSyntax: true

menu:
  main:
    - identifier: Categories
      name: Categories
      url: /posts/
      weight: 10
    - identifier: Tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: Search
      name: Search
      url: /search/
      weight: 30

privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
  instagram:
    disable: true
  twitter:
    disable: true
  vimeo:
    disable: true
  youtube:
    disable: true
